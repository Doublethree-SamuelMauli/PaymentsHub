version: "2"
sql:
  - engine: "postgresql"
    queries: "queries"
    schema: "db/migrations"
    gen:
      go:
        package: "dbgen"
        out: "internal/adapters/db/dbgen"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_enum_valid_method: true
        emit_all_enum_values: true
